<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://opporeview-cv-storage.s3.ap-southeast-1.amazonaws.com/system/logo.png" />
    <link rel="apple-touch-icon" href="https://opporeview-cv-storage.s3.ap-southeast-1.amazonaws.com/system/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ốp Pờ - Nền tảng tuyển dụng hiện đại</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        overflow-x: hidden !important;
      }
    </style>
    <!-- Single Page Apps for GitHub Pages -->
    <!-- https://github.com/rafgraph/spa-github-pages -->
    <script>
      // Xử lý redirect từ 404.html cho GitHub Pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Silence all console output in production
      (function() {
        try {
          // Detect production: Vite sets import.meta.env.PROD but that's only in modules.
          // In production builds served from oppocareer.com, the hostname won't be localhost.
          var isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
          if (!isDev) {
            var noop = function(){};
            console.log = noop;
            console.info = noop;
            console.debug = noop;
            console.warn = noop;
          }
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
